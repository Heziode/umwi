name: Unicode data update

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: alire-project/setup-alire@v4
        with:
          version: "2.1.0"

      - name: Refresh Unicode data and regenerate
        id: refresh
        run: |
          set -euo pipefail
          chmod +x generator/refresh.sh
          generator/refresh.sh
          if git diff --quiet -- \
               generator/share/generator/ \
               src/umwi-generated.ads; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify umwi library builds
        if: steps.refresh.outputs.changed == 'true'
        run: alr -n build

      - name: Verify demo builds and self-checks pass
        if: steps.refresh.outputs.changed == 'true'
        working-directory: demo
        run: |
          alr -n build
          ./bin/demo

      - name: Verify clusters_demo builds and self-checks pass
        if: steps.refresh.outputs.changed == 'true'
        working-directory: clusters_demo
        run: |
          alr -n build
          ./bin/clusters_demo

      - name: Detect upstream Unicode version
        id: version
        if: steps.refresh.outputs.changed == 'true'
        run: |
          ver=$(awk -F'[-.]' '/^# EastAsianWidth-/ {print $2"."$3"."$4; exit}' \
                  generator/share/generator/EastAsianWidth.txt)
          echo "version=${ver:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Open pull request with the regenerated tables
        if: steps.refresh.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: unicode-data-update
          base: main
          delete-branch: true
          commit-message: |
            chore: refresh Unicode data tables (UCD ${{ steps.version.outputs.version }})

            Auto-generated by .github/workflows/unicode-update.yml.
            Pulls the latest UCD files into generator/share/generator/ and
            reruns the generator to refresh src/umwi-generated.ads. The umwi
            library, demo and clusters_demo all build green with the new
            tables.
          title: "feat: refresh Unicode data tables (UCD ${{ steps.version.outputs.version }})"
          body: |
            Daily Unicode data check found upstream changes.

            **Upstream UCD version detected:** `${{ steps.version.outputs.version }}`

            Changed files in this PR:
            - `generator/share/generator/UnicodeData.txt`
            - `generator/share/generator/EastAsianWidth.txt`
            - `generator/share/generator/emoji-data.txt`
            - `generator/share/generator/emoji-sequences.txt`
            - `src/umwi-generated.ads` (regenerated)

            All of the following passed in CI before this PR was opened:

            - `alr -n build` in the umwi root
            - `demo/bin/demo` (length-4 invariants still hold)
            - `clusters_demo/bin/clusters_demo` (28 self-checks pass)

            Please review the diff in `src/umwi-generated.ads` for any
            unexpected churn before merging.
          labels: |
            unicode
            automated
